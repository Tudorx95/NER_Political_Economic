version: "3.9"

services:
  backend:
    image: tudorx95/ner-political-economic:backend
    container_name: ner-backend
    restart: unless-stopped
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - DB_NAME=test_database
    depends_on:
      - mongo

  frontend:
    image: tudorx95/ner-political-economic:frontend
    container_name: ner-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

  mongo:
    image: mongo:7
    container_name: ner-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
