version: '3.8'

services:
  backend:
    build: ./backend
    container_name: ner-backend
    ports:
      - "8000:8000"
    environment:
      - GLINER_REPO=Tudorx95/NER_Economic_Political
      - SPACY_REPO=Tudorx95/NER_Economic_Political_Spacy
    volumes:
      - model-cache:/app/models
    # Decomentaza liniile de mai jos daca ai GPU NVIDIA:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: ner-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  model-cache:
